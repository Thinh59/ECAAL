# Exp C — Full model: EfficientNet-B0 + CBAM + ASL
seed: 42
num_epochs: 20
output_dir: /kaggle/working/outputs

model:
  backbone: efficientnet_b0
  num_classes: 80
  use_cbam: true
  pretrained: true
  dropout: 0.3

loss:
  name: asl
  gamma_pos: 0
  gamma_neg: 4
  clip: 0.05
  eps: 1.0e-5          # Tăng eps 1e-8→1e-5 để tránh log(~0) → NaN

optimizer:
  lr: 3.0e-4          # Giống Exp B (ASL fix + eps=1e-5 đã xử lý NaN)
  weight_decay: 1.0e-4

max_norm: 1.0         # Default (ASL fix đã ổn định, không cần clipping chặt)

data:
  dataset: coco
  data_root: /kaggle/input/datasets/awsaf49/coco-2017-dataset/coco2017
  subset_ids_path: /kaggle/working/data/coco_subset
  batch_size: 64
  num_workers: 2
  img_size: 224
