# Exp C — Full model: EfficientNet-B0 + CBAM + ASL
seed: 42
num_epochs: 20
output_dir: /kaggle/working/outputs

model:
  backbone: efficientnet_b0
  num_classes: 80
  use_cbam: true
  pretrained: true
  dropout: 0.3

loss:
  name: asl
  gamma_pos: 0
  gamma_neg: 4
  clip: 0.05
  # eps: 1e-5 REMOVED — default eps=1e-8 trong AsymmetricLoss là đủ,
  # eps=1e-5 làm mất gradient signal ở vùng prob rất nhỏ → mAP thấp hơn.
  # NaN trong log_fix.json là do lr quá cao sau epoch 10, không phải do eps.

optimizer:
  lr: 3.0e-4
  weight_decay: 1.0e-4

# max_norm KHÔNG set ở đây — default 1.0 trong train.py là tốt.
# retrain_multiseed notebook suggest max_norm=0.5 nhưng đó là cho
# scenario NaN-recovery, không cần thiết với config chuẩn này.

data:
  dataset: coco
  data_root: /kaggle/input/datasets/awsaf49/coco-2017-dataset/coco2017
  subset_ids_path: /kaggle/working/data/coco_subset
  batch_size: 64
  num_workers: 2
  img_size: 224
