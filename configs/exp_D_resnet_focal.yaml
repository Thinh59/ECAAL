# Exp D — So sánh trung gian: ResNet50 + Focal Loss
seed: 42
num_epochs: 20
output_dir: /kaggle/working/outputs

model:
  backbone: resnet50
  num_classes: 80
  use_cbam: false
  pretrained: true
  dropout: 0.3

loss:
  name: focal
  gamma: 2.0

optimizer:
  lr: 3.0e-4
  weight_decay: 1.0e-4

data:
  dataset: coco
  data_root: /kaggle/input/coco-2017-dataset/coco2017
  subset_ids_path: /kaggle/working/data/coco_subset
  batch_size: 64
  num_workers: 2
  img_size: 224
