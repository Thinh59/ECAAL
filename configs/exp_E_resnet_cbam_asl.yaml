# Exp E — ResNet50 + CBAM + ASL
# Mục đích: ablation CBAM trên backbone ResNet50 (so sánh với Exp B: ResNet50+ASL không CBAM)
# Expected mAP: ~0.71-0.73 (cao hơn Exp B ~0.70 do CBAM)
seed: 42
num_epochs: 20
output_dir: /kaggle/working/outputs

model:
  backbone: resnet50
  num_classes: 80
  use_cbam: true
  pretrained: true
  dropout: 0.3

loss:
  name: asl
  gamma_pos: 0
  gamma_neg: 4
  clip: 0.05
  # eps dùng default 1e-8 — đủ stable với ResNet50 + gradient clipping

optimizer:
  lr: 3.0e-4
  weight_decay: 1.0e-4

data:
  dataset: coco
  data_root: /kaggle/input/datasets/awsaf49/coco-2017-dataset/coco2017
  subset_ids_path: /kaggle/working/data/coco_subset
  batch_size: 64
  num_workers: 2
  img_size: 224
